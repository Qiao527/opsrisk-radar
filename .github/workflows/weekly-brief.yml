name: Weekly Brief

on:
  schedule:
    # 12:30 UTC = 7:30 AM EST / 8:30 AM EDT (America/New_York), Mondays
    - cron: "30 12 * * 1"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install package
        run: pip install -e .

      - name: Fetch feeds and score
        run: python -m opsrisk run

      - name: Validate database
        run: python -m opsrisk validate

      - name: Generate weekly Markdown report
        run: python -m opsrisk weekly

      - name: Generate HTML reports
        run: python -m opsrisk html

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-reports
          path: |
            reports/weekly/*.html
            reports/weekly/*.md
          retention-days: 14

      - name: Send weekly report email
        if: env.RESEND_API_KEY != ''
        continue-on-error: true
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          REPORT_EMAIL_TO: ${{ secrets.REPORT_EMAIL_TO }}
          REPORT_EMAIL_FROM: ${{ secrets.REPORT_EMAIL_FROM }}
        run: |
          REPORT=$(ls reports/weekly/*.html 2>/dev/null | head -1)
          if [ -n "$REPORT" ]; then
            python scripts/send_report_email.py "$REPORT"
          else
            echo "No weekly HTML report found, skipping send"
          fi
